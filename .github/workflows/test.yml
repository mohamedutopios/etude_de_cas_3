name: CI/CD Cypress Tests
on: workflow_dispatch

permissions:
  contents: write  # Nécessaire pour pousser sur gh-pages

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Cache Cypress binary
        uses: actions/cache@v3
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-cypress-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cypress-

      - name: Install Cypress binary
        run: npx cypress install

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # Récupère l'historique depuis gh-pages pour les tendances inter-runs
      - name: Checkout gh-pages history
        run: |
          if git ls-remote --exit-code origin gh-pages; then
            git fetch origin gh-pages
            mkdir -p allure-history
            git checkout origin/gh-pages -- history/ 2>/dev/null || true
            cp -r history allure-history/ 2>/dev/null || true
          fi

      - name: Start local server
        run: npx serve -s . -l 8080 &

      - name: Wait for server
        run: npx wait-on http://localhost:8080

      - name: Run Cypress Tests
        run: npm run test
        env:
          CYPRESS_baseUrl: http://localhost:8080
        continue-on-error: true  # Génère le rapport même si des tests échouent

      # Injecte l'historique précédent pour les graphiques de tendance
      - name: Copy Allure history into results
        run: |
          if [ -d "allure-history/history" ]; then
            cp -r allure-history/history allure-results/history
          fi

      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report

      # Déploiement sur GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
          keep_files: false
          destination_dir: .
          commit_message: "ci: deploy Allure report - run #${{ github.run_number }}"

      - name: Print Report URL
        run: |
          echo "✅ Allure Report disponible sur :"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 7
