name: CI/CD Cypress Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Étape 1 : Cloner le dépôt
      - name: Checkout repository
        uses: actions/checkout@v3

      # Étape 2 : Installer Node.js version 18
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # Étape 3 : Installer les dépendances
      - name: Install dependencies
        run: npm install

      # Étape 4 : Lancer le serveur local (ton script start)
      - name: Start local server
        run: npm run start &
        # le & permet de lancer le serveur en arrière-plan

      # Étape 5 : Attendre que le serveur soit prêt
      - name: Wait for server
        run: npx wait-on http://localhost:8080

      # Étape 6 : Exécuter les tests Cypress
      - name: Run Cypress Tests
        run: npm run test
        env:
          CYPRESS_baseUrl: http://localhost:8080

